<script>
    // ==========================================
    // 1. KREDENSIAL SUPABASE
    // ==========================================
    const SUPABASE_URL = 'https://rqtysqrmmmuuukbhtqqw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxdHlzcXJtbW11dXVrYmh0cXF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NDUyOTQsImV4cCI6MjA5OTMyMTI5NH0.hd5hXItnRvcqBzbRSCBLFyok-mWKBxCfTfN9RCRS0Q8';
    
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Variabel global untuk menyimpan instance grafik
    let chartInstances = {};

    // ==========================================
    // 2. FUNGSI UTAMA PENGAMBILAN & FILTER DATA
    // ==========================================
    async function loadDashboardData() {
        try {
            // Ambil Nilai dari Input Filter HTML
            const filterDate = document.getElementById('filter-date').value; 
            const filterStore = document.getElementById('filter-store').value;
            const filterRole = document.getElementById('filter-role').value;
            const filterCategory = document.getElementById('filter-category').value;

            // Tarik Data Mentah dari Supabase
            const { data: rawMasterData, error: errMaster } = await supabaseClient.from('master_checklist').select('*').order('created_at', { ascending: false });
            const { data: rawIssueData, error: errIssue } = await supabaseClient.from('issue_log').select('*').order('created_at', { ascending: false });

            if (errMaster) throw errMaster;
            if (errIssue) throw errIssue;

            // Proses Penyaringan (Filtering) Data Master
            const masterData = (rawMasterData || []).filter(row => {
                let matchDate = true, matchStore = true, matchRole = true, matchCategory = true;
                
                if (filterDate && row.created_at) matchDate = row.created_at.substring(0, 10) === filterDate;
                if (filterStore) matchStore = row.store_code === filterStore;
                if (filterRole) matchRole = row.role === filterRole;
                if (filterCategory) matchCategory = row.task_category === filterCategory;
                
                return matchDate && matchStore && matchRole && matchCategory;
            });

            // Proses Penyaringan (Filtering) Data Issue
            const issueData = (rawIssueData || []).filter(row => {
                let matchDate = true, matchStore = true, matchRole = true;
                
                if (filterDate && row.created_at) matchDate = row.created_at.substring(0, 10) === filterDate;
                if (filterStore) matchStore = row.store_code === filterStore;
                if (filterRole) matchRole = row.role === filterRole;
                
                return matchDate && matchStore && matchRole;
            });

            // Update Scorecards
            const totalAktifitas = masterData.length;
            const totalIsu = issueData.length;
            const issuePercent = totalAktifitas > 0 ? ((totalIsu / totalAktifitas) * 100).toFixed(1) : 0;

            document.getElementById('val-total-aktifitas').innerText = totalAktifitas;
            document.getElementById('val-total-isu').innerText = totalIsu;
            document.getElementById('val-issue-percent').innerText = issuePercent + '%';

            // Update Tables & Charts
            renderIssueTable(issueData);
            renderDailyTable(masterData);
            processBarChartData(masterData);
            processDonutChartData(issueData);
            processLineChartData(issueData);

        } catch (error) {
            console.error("Gagal mengambil data:", error);
            alert("Gagal memuat data dashboard. Cek koneksi atau RLS Supabase.");
        }
    }

    // ==========================================
    // 3. RENDER GRAFIK (CHART.JS)
    // ==========================================
    function processBarChartData(masterData) {
        const storeStats = {};
        masterData.forEach(row => {
            const store = row.store_code || 'Unknown';
            if (!storeStats[store]) storeStats[store] = { tepat: 0, telat: 0 };
            
            if (row.status_waktu === 'Telat') storeStats[store].telat += 1;
            else storeStats[store].tepat += 1;
        });

        const labels = Object.keys(storeStats);
        const dataTelat = labels.map(store => storeStats[store].telat);
        const dataTepat = labels.map(store => storeStats[store].tepat);

        renderChart('barChart', 'bar', {
            labels: labels,
            datasets: [
                { label: 'Telat', data: dataTelat, backgroundColor: '#ff4d4d' },
                { label: 'Tepat Waktu', data: dataTepat, backgroundColor: '#4d79ff' }
            ]
        }, {
            indexAxis: 'y',
            scales: { x: { stacked: true }, y: { stacked: true } }
        });
    }

    function processDonutChartData(issueData) {
        const taskCounts = {};
        issueData.forEach(row => {
            const task = row.task_name || 'Lainnya';
            taskCounts[task] = (taskCounts[task] || 0) + 1;
        });

        renderChart('donutChart', 'doughnut', {
            labels: Object.keys(taskCounts),
            datasets: [{ data: Object.values(taskCounts), backgroundColor: ['#b366ff', '#ffa64d', '#ff4d4d', '#4d79ff', '#00263f'] }]
        }, {
            plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: {size: 10} } } }
        });
    }

    function processLineChartData(issueData) {
        const dateCounts = {};
        const sortedData = [...issueData].reverse(); 
        
        sortedData.forEach(row => {
            if(!row.created_at) return;
            const dateOnly = new Date(row.created_at).toLocaleDateString('id-ID', {day: 'numeric', month: 'short'});
            dateCounts[dateOnly] = (dateCounts[dateOnly] || 0) + 1;
        });

        renderChart('lineChart', 'line', {
            labels: Object.keys(dateCounts),
            datasets: [{
                label: 'Record Count',
                data: Object.values(dateCounts),
                borderColor: '#4d79ff',
                backgroundColor: 'rgba(77, 121, 255, 0.1)',
                fill: true,
                tension: 0.1
            }]
        }, {
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
        });
    }

    function renderChart(canvasId, type, data, options = {}) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        if (chartInstances[canvasId]) chartInstances[canvasId].destroy();

        chartInstances[canvasId] = new Chart(ctx, {
            type: type,
            data: data,
            options: { responsive: true, ...options }
        });
    }

    // ==========================================
    // 4. RENDER TABEL
    // ==========================================
    function renderIssueTable(data) {
        const tbody = document.querySelector('#issue-table tbody');
        tbody.innerHTML = '';
        data.slice(0, 10).forEach(row => {
            const date = row.created_at ? new Date(row.created_at).toLocaleString('id-ID', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'}) : '-';
            tbody.innerHTML += `
                <tr>
                    <td>${date}</td>
                    <td>${row.store_code || '-'}</td>
                    <td>${row.role || '-'}</td>
                    <td>${row.task_name || '-'}</td>
                    <td>${row.crew_note || '-'}</td>
                    <td>${row.sup_note || '-'}</td>
                </tr>
            `;
        });
    }

    function renderDailyTable(data) {
        const tbody = document.querySelector('#daily-table tbody');
        tbody.innerHTML = '';
        data.slice(0, 10).forEach(row => {
            const date = row.created_at ? new Date(row.created_at).toLocaleString('id-ID', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'}) : '-';
            tbody.innerHTML += `
                <tr>
                    <td>${date}</td>
                    <td>${row.store_code || '-'}</td>
                    <td>${row.role || '-'}</td>
                    <td>${row.task_category || '-'}</td>
                    <td>${row.crew_pic || '-'}</td>
                    <td>${row.sup_pic || '-'}</td>
                </tr>
            `;
        });
    }

    // Load data otomatis saat pertama kali dibuka
    window.onload = loadDashboardData;
</script>
